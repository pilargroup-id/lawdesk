name: Deploy lawdesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy Lawdesk to Windows Server
    runs-on: self-hosted

    env:
      PHP_DIR: C:\laragon\bin\php\php-8.4.13-nts-Win32-vs17-x64
      DEPLOY_PATH: C:\lawdesk\backend

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------
      # 2. Force frontend production env
      # CI/CD build wajib pakai env lawdesk
      # -------------------------
      - name: Create frontend production env
        shell: powershell
        run: |
          Write-Host ">> Creating frontend .env.production for lawdesk..."

          $envContent = @(
            "VITE_API_URL=https://lawdesk.pilargroup.id/api"
            "VITE_APP_NAME=Lawdesk"
            "VITE_APP_ENV=production"
            "VITE_SSO_LOGIN_URL=https://pilargroup.id/login"
            "VITE_CENTRAL_PORTAL_API_URL=https://pilargroup.id"
          )

          $envContent | Set-Content -Path "$env:GITHUB_WORKSPACE\frontend\.env.production" -Encoding UTF8

          Write-Host ">> Frontend .env.production created:"
          Get-Content "$env:GITHUB_WORKSPACE\frontend\.env.production"

      # -------------------------
      # 3. Install frontend dependencies
      # -------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        shell: cmd
        run: C:\nvm4w\nodejs\npm.cmd install

      # -------------------------
      # 4. Build frontend
      # Vite output: ../backend/public
      # -------------------------
      - name: Build frontend
        working-directory: frontend
        shell: cmd
        run: C:\nvm4w\nodejs\npm.cmd run build

      # -------------------------
      # 5. Ensure backend destination exists
      # -------------------------
      - name: Ensure backend destination
        shell: powershell
        run: |
          Write-Host ">> Ensuring $env:DEPLOY_PATH exists..."

          if (-not (Test-Path $env:DEPLOY_PATH)) {
            New-Item -ItemType Directory -Path $env:DEPLOY_PATH -Force
          }

          Write-Host ">> Done"

      # -------------------------
      # 6. Clean old frontend assets
      # -------------------------
      - name: Clean old frontend assets
        shell: powershell
        run: |
          Write-Host ">> Cleaning old frontend build assets..."

          if (Test-Path "$env:DEPLOY_PATH\public\assets") {
            Remove-Item "$env:DEPLOY_PATH\public\assets" -Recurse -Force
          }

          if (Test-Path "$env:DEPLOY_PATH\public\index.html") {
            Remove-Item "$env:DEPLOY_PATH\public\index.html" -Force
          }

          Write-Host ">> Done"

      # -------------------------
      # 7. Copy Laravel backend
      # React/Vite build already exists in backend/public
      # -------------------------
      - name: Copy Laravel backend
        shell: powershell
        run: |
          Write-Host ">> Copying backend to $env:DEPLOY_PATH..."

          Copy-Item -Path "$env:GITHUB_WORKSPACE\backend\*" `
            -Destination $env:DEPLOY_PATH `
            -Recurse -Force `
            -Exclude "vendor","storage",".env","node_modules" `
            -ErrorAction Stop

          Write-Host ">> Done"

      # -------------------------
      # 8. Ensure Laravel writable directories
      # -------------------------
      - name: Ensure Laravel writable directories
        shell: powershell
        run: |
          Write-Host ">> Ensuring Laravel writable directories..."

          New-Item -ItemType Directory -Force "$env:DEPLOY_PATH\storage"
          New-Item -ItemType Directory -Force "$env:DEPLOY_PATH\storage\logs"
          New-Item -ItemType Directory -Force "$env:DEPLOY_PATH\bootstrap\cache"

          Write-Host ">> Done"

      # -------------------------
      # 9. Install Composer dependencies
      # -------------------------
      - name: Install Laravel dependencies
        shell: powershell
        run: |
          Write-Host ">> Adding PHP to PATH..."
          $env:Path = "$env:PHP_DIR;$env:Path"

          Write-Host ">> PHP version:"
          php -v

          Write-Host ">> Installing Composer dependencies..."
          cd $env:DEPLOY_PATH
          composer install --no-dev --optimize-autoloader --no-interaction

          Write-Host ">> Done"

      # -------------------------
      # 10. Optimize Laravel
      # -------------------------
      - name: Optimize Laravel
        shell: powershell
        run: |
          Write-Host ">> Adding PHP to PATH..."
          $env:Path = "$env:PHP_DIR;$env:Path"

          cd $env:DEPLOY_PATH

          Write-Host ">> Clearing Laravel cache..."
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

          Write-Host ">> Building Laravel cache..."
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          Write-Host ">> Done"

      # -------------------------
      # 11. Verify deployment
      # -------------------------
      - name: Verify deployment
        shell: powershell
        run: |
          Write-Host ">> Verifying deployed files..."

          if (-not (Test-Path "$env:DEPLOY_PATH\artisan")) {
            throw "Laravel artisan file not found in $env:DEPLOY_PATH"
          }

          if (-not (Test-Path "$env:DEPLOY_PATH\public")) {
            throw "Laravel public folder not found in $env:DEPLOY_PATH"
          }

          if (-not (Test-Path "$env:DEPLOY_PATH\public\index.html")) {
            throw "Frontend index.html not found in $env:DEPLOY_PATH\public"
          }

          if (-not (Test-Path "$env:DEPLOY_PATH\public\assets")) {
            throw "Frontend assets folder not found in $env:DEPLOY_PATH\public"
          }

          if (-not (Test-Path "$env:DEPLOY_PATH\.env")) {
            throw ".env file not found in $env:DEPLOY_PATH"
          }

          Write-Host ">> Deploy lawdesk selesai"